<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 - MY TODO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-circles">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
    <div class="circle circle-4"></div>
  </div>

  <div class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-logo">MY TODO</h1>
      <h2 class="auth-title">비밀번호 찾기</h2>
      <p class="auth-desc">가입한 아이디(이메일)를 입력하면<br>비밀번호 재설정 링크를 발송합니다.</p>

      <div class="auth-error   hidden" id="findPwError"></div>
      <div class="auth-success hidden" id="findPwSuccess">
        재설정 이메일을 발송했습니다.<br>이메일을 확인해주세요.
      </div>

      <input type="email" class="auth-input" id="findPwId" placeholder="아이디 (이메일)" autocomplete="email">

      <button class="auth-btn" id="btnFindPw">재설정 메일 발송</button>

      <a class="auth-link center" href="index.html">← 로그인으로 돌아가기</a>
    </div>
  </div>

  <script type="module" src="forgot-password.js"></script>
</body>
</html>
